{% extends 'blog\base.html' %}
{% block base %}
    <section class="hero is-fullheight hero-bg">
      <div class="hero-body" >
        <div class="container">
          <div class="columns is-centered">
            <div class="column is-5-tablet is-4-desktop is-3-widescreen">
              <div class="box">
                <h1 class="title has-text-centered">Register</h1>
                <form>
                  <div class="field"><label class="label">Username</label><div class="control"><input class="input" type="text" placeholder="User"></div></div>
                  <div class="field"><label class="label">Email</label><div class="control"><input class="input" type="email" placeholder="Email"></div></div>
                  <div class="field"><label class="label">Password</label><div class="control"><input class="input" type="password" placeholder="Pass"></div></div>
                  <button class="button is-primary is-fullwidth is-outlined">Sign Up</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
{% endblock %}
